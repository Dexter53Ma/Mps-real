      - generic [ref=f145e96]:
        - generic [ref=f145e97]:
          - heading "Everything you need" [level=2] [ref=f145e98]
          - paragraph [ref=f145e99]: From the moment you arrive your space is fully equipped for impact. Every booking includes considered details and high-quality amenities to ensure your meeting or event run effortlessly.
          - heading "Your space always includes" [level=3] [ref=f145e100]
          - generic [ref=f145e101]:
            - generic [ref=f145e102]:
              - img [ref=f145e104]
              - generic [ref=f145e106]:
                - heading "Flexible layouts" [level=4] [ref=f145e107]
                - paragraph [ref=f145e108]: Make the space work for you. From boardroom meetings to open-plan setups for team bonding or networking, reconfigure the room to create the perfect environment for any occasion.
            - generic [ref=f145e109]:
              - img [ref=f145e111]
              - generic [ref=f145e113]:
                - heading "Super-fast Wi-Fi" [level=4] [ref=f145e114]
                - paragraph [ref=f145e115]: Stay connected with reliable WiFi throughout the space. Whether you're hosting a video conference or streaming content, you'll have the speed and stability for a seamless experience.
            - generic [ref=f145e116]:
              - img [ref=f145e118]
              - generic [ref=f145e120]:
                - heading "Equipment" [level=4] [ref=f145e121]
                - paragraph [ref=f145e122]: Our spaces come equipped with everything you need for a polished, professional experience, from presentation screens to full AV facilities. It's all set up for you to plug in and play the moment you arrive.
            - generic [ref=f145e123]:
              - img [ref=f145e125]
              - generic [ref=f145e127]:
                - heading "Onsite tech-support" [level=4] [ref=f145e128]
                - paragraph [ref=f145e129]: Our team is on hand before and during your booking to handle any connectivity queries or room setups, so you can focus on the event while we take care of the details.
            - generic [ref=f145e130]:
              - img [ref=f145e132]
              - generic [ref=f145e134]:
                - heading "Complimentary hot drinks" [level=4] [ref=f145e135]
                - paragraph [ref=f145e136]: Help yourself to a selection of teas and coffee from the machines available throughout your booking. Keeping you and your guests focused and refreshed.
            - generic [ref=f145e137]:
              - img [ref=f145e139]
              - generic [ref=f145e141]:
                - heading "Catering options for events" [level=4] [ref=f145e142]
                - paragraph [ref=f145e143]: From breakfast selections and light refreshments to working lunches and full event catering, we offer something for every occasion. Our team can help tailor a package ideal for your event.
