      - generic [ref=f145e48]:
        - heading "Meeting & Event Spaces" [level=1] [ref=f145e49]
        - paragraph [ref=f145e50]: Book beautifully designed meeting rooms and event spaces across our two Central London locations. Whether you're hosting a one-to-one, a focused team session or a larger gathering, we have a space to suit you.
