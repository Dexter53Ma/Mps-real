          - img "Event space" [ref=f145e57]
        - generic [ref=f145e58]:
          - heading "Flexible spaces" [level=2] [ref=f145e59]
          - paragraph [ref=f145e60]: Whether you're planning a quick catch-up, a client presentation or a larger event, our flexible layouts make it easy to create the right setting without the hassle.
