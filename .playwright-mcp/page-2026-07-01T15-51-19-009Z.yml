      - generic [ref=f28e66]:
        - generic [ref=f28e67]:
          - heading "Most asked questions" [level=4] [ref=f28e68]
          - generic [ref=f28e69]:
            - generic [ref=f28e70]:
              - button "What does your price include?" [ref=f28e71] [cursor=pointer]:
                - generic [ref=f28e72]: What does your price include?
                - img [ref=f28e73]
              - paragraph [ref=f28e75]: "At Storey we have one single, all-inclusive rate which includes: rent; utilities; business rates; services; and facilities. In addition access to Storey Club, our meeting and event space, is available to Storey and British Land customers."
            - generic [ref=f28e76]:
              - button "What is the min/max number of people in your offices?" [ref=f28e77] [cursor=pointer]:
                - generic [ref=f28e78]: What is the min/max number of people in your offices?
                - img [ref=f28e79]
              - paragraph [ref=f28e81]: Storey provides office space for a minimum of around 20 people. There is no maximum.
            - generic [ref=f28e82]:
              - button "Can I upsize/downsize in the future?" [ref=f28e83] [cursor=pointer]:
                - generic [ref=f28e84]: Can I upsize/downsize in the future?
                - img [ref=f28e85]
              - paragraph [ref=f28e87]: At Storey we want to offer flexibility. If your space requirement changes, we can look at different options to upsize or downsize depending on your needs.
            - generic [ref=f28e88]:
              - button "What size offices are available?" [ref=f28e89] [cursor=pointer]:
                - generic [ref=f28e90]: What size offices are available?
                - img [ref=f28e91]
              - paragraph [ref=f28e93]: Storey offices are bespoke to your business needs. Please speak to one of the team to discuss your requirements in more detail.
            - generic [ref=f28e94]:
              - button "How long are your leases?" [ref=f28e95] [cursor=pointer]:
                - generic [ref=f28e96]: How long are your leases?
                - img [ref=f28e97]
              - paragraph [ref=f28e99]: The minimum lease length at Storey is 12 months. On average our customers tend to take leases that range between 2 – 4 years.
            - generic [ref=f28e100]:
              - button "What type of offices do you offer?" [ref=f28e101] [cursor=pointer]:
                - generic [ref=f28e102]: What type of offices do you offer?
                - img [ref=f28e103]
              - paragraph [ref=f28e105]: Storey offices are completely private and personalised to each customer. Customers can benefit from a mix of private and shared facilities, such as kitchens, lounge space and meeting rooms or we can accommodate businesses looking for entirely private space. In addition Storey Club, our meeting and event space, is available to Storey and British Land customers.
        - generic [ref=f28e106]:
          - heading "Pricing" [level=4] [ref=f28e107]
          - generic [ref=f28e108]:
            - generic [ref=f28e109]:
              - button "How much does a Storey office cost?" [ref=f28e110] [cursor=pointer]:
                - generic [ref=f28e111]: How much does a Storey office cost?
                - img [ref=f28e112]
              - paragraph [ref=f28e114]: Storey offices are bespoke to your business needs. Please speak to one of the team to discuss your requirements in more detail.
            - generic [ref=f28e115]:
              - button "Is there a receptionist at your locations?" [ref=f28e116] [cursor=pointer]:
                - generic [ref=f28e117]: Is there a receptionist at your locations?
                - img [ref=f28e118]
              - paragraph [ref=f28e120]: We have manned receptions at most of our locations and where this isn't possible, we have video intercom and entry systems that are accessible from your private office. Your dedicated Community Manager is also available during business hours from Monday to Friday.
            - generic [ref=f28e121]:
              - button "What does your price include?" [ref=f28e122] [cursor=pointer]:
                - generic [ref=f28e123]: What does your price include?
                - img [ref=f28e124]
              - paragraph [ref=f28e126]: "At Storey we have one single, all-inclusive rate which includes: rent; utilities; business rates; services; and facilities. In addition Storey Club, our meeting and event space, is available to Storey and British Land customers."
        - generic [ref=f28e127]:
          - heading "Customisation" [level=4] [ref=f28e128]
          - generic [ref=f28e129]:
            - generic [ref=f28e130]:
              - button "Can I design my own office layout?" [ref=f28e131] [cursor=pointer]:
                - generic [ref=f28e132]: Can I design my own office layout?
                - img [ref=f28e133]
              - paragraph [ref=f28e135]: Yes. The Storey team will work with you, alongside architects and interior designers, to create the right layout to suit the needs of your business.
            - generic [ref=f28e136]:
              - button "Meeting rooms in your office space" [ref=f28e137] [cursor=pointer]:
                - generic [ref=f28e138]: Meeting rooms in your office space
                - img [ref=f28e139]
              - paragraph [ref=f28e141]: Each office is set up to include meeting rooms based on the size of your space. The Storey team can help you identify the best way to optimise your space should you require more or less. There are also several meeting rooms available within the shared spaces. Plus, Storey Club offers additional meeting room and event space for all Storey customers.
            - generic [ref=f28e142]:
              - button "What furniture is included with Storey?" [ref=f28e143] [cursor=pointer]:
                - generic [ref=f28e144]: What furniture is included with Storey?
                - img [ref=f28e145]
              - paragraph [ref=f28e147]: As standard, we provide all Storey customers with desks, desk chairs and desk power bars. The product team at Storey have curated a menu where you can select furniture to customise the look and feel of your space. You can also bring existing furniture into your space. It's your space, we want to give you the flexibility to make it a place for you to grow your business.
            - generic [ref=f28e148]:
              - button "Can I customise my office?" [ref=f28e149] [cursor=pointer]:
                - generic [ref=f28e150]: Can I customise my office?
                - img [ref=f28e151]
              - paragraph [ref=f28e153]: "Yes. The team at Storey will work with you to personalise your office to meet the needs of your business and employees. This includes: office layout; AV; interior design; planting; furniture; your brand on your front door; and even your access passes."
        - generic [ref=f28e154]:
          - heading "Credits" [level=4] [ref=f28e155]
          - generic [ref=f28e156]:
            - generic [ref=f28e157]:
              - button "Where can I use Storey credits?" [ref=f28e158] [cursor=pointer]:
                - generic [ref=f28e159]: Where can I use Storey credits?
                - img [ref=f28e160]
              - paragraph [ref=f28e162]: You can use them to book meetings in your own Storey location or one of our Storey Club's – including 100 Liverpool Street (British Land's most state-of-the-art building) and 4 Kingdom Street (right next to Paddington station).
            - generic [ref=f28e163]:
              - button "Who can buy extra credits?" [ref=f28e164] [cursor=pointer]:
                - generic [ref=f28e165]: Who can buy extra credits?
                - img [ref=f28e166]
              - paragraph [ref=f28e168]: That's entirely up to you – you tell us who in your company you want (or don't want) to have that power.
            - generic [ref=f28e169]:
              - button "Who can get Storey credits?" [ref=f28e170] [cursor=pointer]:
                - generic [ref=f28e171]: Who can get Storey credits?
                - img [ref=f28e172]
              - paragraph [ref=f28e174]: Any Storey customer – and only Storey customers.
            - generic [ref=f28e175]:
              - button "How do Storey credits work?" [ref=f28e176] [cursor=pointer]:
                - generic [ref=f28e177]: How do Storey credits work?
                - img [ref=f28e178]
              - paragraph [ref=f28e180]: Every month, you get a certain number of free Storey credits –usually, this is based on a % of your rent. You can use these free credits to book shared meeting rooms in your own Storey location, or any Storey Club, using our online booking system. You can buy more credits if you need to – for £1 per credit.
            - generic [ref=f28e181]:
              - button "What is your cancellation policy?" [ref=f28e182] [cursor=pointer]:
                - generic [ref=f28e183]: What is your cancellation policy?
                - img [ref=f28e184]
              - paragraph [ref=f28e186]: "Shared meeting rooms You get: a 100% refund if you cancel at least 24 hours before; a 50% refund if you cancel at least 4 hours before; Non-refundable if you cancel within 4 hours. Storey Club You can get a full refund if you cancel at least 5 days before. For the full details, see our Terms and Conditions."
            - generic [ref=f28e187]:
              - button "Can I use my Storey credits to pay for catering at Storey Club?" [ref=f28e188] [cursor=pointer]:
                - generic [ref=f28e189]: Can I use my Storey credits to pay for catering at Storey Club?
                - img [ref=f28e190]
              - paragraph [ref=f28e192]: No. You can only pay for the room with your credits, not catering or any add-ons.
            - generic [ref=f28e193]:
              - button "How much does it cost to buy extra credits?" [ref=f28e194] [cursor=pointer]:
                - generic [ref=f28e195]: How much does it cost to buy extra credits?
                - img [ref=f28e196]
              - paragraph [ref=f28e198]: It's £1 a credit (but if you buy them in bulk, they're cheaper).
            - generic [ref=f28e199]:
              - button "Do my Storey credits expire?" [ref=f28e200] [cursor=pointer]:
                - generic [ref=f28e201]: Do my Storey credits expire?
                - img [ref=f28e202]
              - paragraph [ref=f28e204]: Every month, you'll get a new set of credits. You have to use those by the end of the same month – they don't rollover. But the extra credits you buy are valid for the whole of your lease.
        - generic [ref=f28e205]:
          - heading "Storey Club" [level=4] [ref=f28e206]
          - generic [ref=f28e208]:
            - button "What are the cancellation policies for Storey Club and shared meeting rooms?" [ref=f28e209] [cursor=pointer]:
              - generic [ref=f28e210]: What are the cancellation policies for Storey Club and shared meeting rooms?
              - img [ref=f28e211]
            - paragraph [ref=f28e213]: "Shared meeting rooms These are unique to Storey customers, your benefit for being our customer in a Storey building You get: • 100% refund if you cancel at least 24 hours before • 50% refund if you cancel at least 4 hours before • Non-refundable if you cancel within 4 hours Storey Club bookings Event Space • Event Space bookings require a non-refundable deposit of 25% of the anticipated booking fee at least 14 days before the event in order to secure the booking • The remainder (75% of the anticipated booking fee) can be refunded if you cancel at least 5 days before Meeting rooms • You can get a full refund if you cancel at least 5 days before For the full details, see our Storey Portal homepage for our Terms and Conditions."
        - generic [ref=f28e214]:
          - heading "Services" [level=4] [ref=f28e215]
          - generic [ref=f28e216]:
            - generic [ref=f28e217]:
              - button "Can I register visitors to my office?" [ref=f28e218] [cursor=pointer]:
                - generic [ref=f28e219]: Can I register visitors to my office?
                - img [ref=f28e220]
              - paragraph [ref=f28e222]: Yes. You can do this via our visitor management system. Specific access arrangements may apply during out of business hours.
            - generic [ref=f28e223]:
              - button "What are your opening hours?" [ref=f28e224] [cursor=pointer]:
                - generic [ref=f28e225]: What are your opening hours?
                - img [ref=f28e226]
              - paragraph [ref=f28e228]: All Storey locations have 24/7 access (with the exception of Storey Club). Any specific out of hours building access arrangements will be communicated to you prior to move in.
            - generic [ref=f28e229]:
              - button "What broadband services and speeds are available?" [ref=f28e230] [cursor=pointer]:
                - generic [ref=f28e231]: What broadband services and speeds are available?
                - img [ref=f28e232]
              - paragraph [ref=f28e234]: "At Storey we have fast, secure, resilient WiFi, complete with private network infrastructure. Office based connectivity: 1-10 Gbps primary line and a backup line."
            - generic [ref=f28e235]:
              - button "Are meeting rooms available in Storey spaces?" [ref=f28e236] [cursor=pointer]:
                - generic [ref=f28e237]: Are meeting rooms available in Storey spaces?
                - img [ref=f28e238]
              - paragraph [ref=f28e240]: "There are a number of meeting rooms available within the shared spaces which are bookable through our interactive portal. All shared meeting rooms include: Flat Screen TV; HDMI and VGA Connections; Power Provision; and WiFi. You also have the option of installing dedicated meeting rooms within your private office space. Storey Club is also available to Storey customers which offers meeting and event space."
            - generic [ref=f28e241]:
              - button "What additional services do you provide?" [ref=f28e242] [cursor=pointer]:
                - generic [ref=f28e243]: What additional services do you provide?
                - img [ref=f28e244]
              - paragraph [ref=f28e246]: "We can provide additional services such as: telephony; confidential waste disposal; handyman services; additional cleaning; and security services (if you were to host an event in your space). Access to Storey Club including the lounge and cafe is included in the Storey price. There is an additional cost for event space."
            - generic [ref=f28e247]:
              - button "What services and facilities are included in the price?" [ref=f28e248] [cursor=pointer]:
                - generic [ref=f28e249]: What services and facilities are included in the price?
                - img [ref=f28e250]
              - paragraph [ref=f28e252]: "Storey services include: daytime and late night cleaning; daily waste collection; recycling; maintenance; and a dedicated Community Manager. Our facilities include: on-site showers with fresh towels; bike racks and storage; coffee machines and dishwashers as well as filtered water stations; and personalised access passes."
